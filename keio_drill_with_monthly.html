<title>慶應受験ドリル</title>
<style>
:root{--kn:#0a2463;--kn2:#1a3a7a;--kn3:#061840;--kr:#c8102e;--kr2:#e8294a;--kg:#f4f5f8;--kw:#ffffff;--kt:#0a2463;--ks:#4a5580;--kb:#d0d5e8;--ko:#b8960c}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:var(--kg);min-height:100vh;color:var(--kt)}
.app{max-width:680px;margin:0 auto}
.header{background:var(--kn);padding:14px 16px;padding-top:calc(14px + env(safe-area-inset-top));display:flex;align-items:center;gap:12px}
.hlogo{width:36px;height:36px;border-radius:8px;overflow:hidden;flex-shrink:0}
.htitle{font-size:17px;font-weight:700;color:#fff;letter-spacing:.03em}
.hsub{font-size:11px;color:rgba(255,255,255,.6);margin-top:1px}
.nav{display:flex;background:var(--kn3);border-bottom:3px solid var(--kr);overflow-x:auto;-webkit-overflow-scrolling:touch}
.nb{flex:1;min-width:60px;font-size:12px;padding:10px 6px 9px;border:none;background:none;cursor:pointer;color:rgba(255,255,255,.55);font-family:inherit;font-weight:500;transition:all .15s;position:relative;white-space:nowrap}
.nb.on{color:#fff;background:var(--kn)}
.nb.on::after{content:'';position:absolute;bottom:-3px;left:0;right:0;height:3px;background:var(--kr)}
.content{padding:16px;padding-bottom:calc(24px + env(safe-area-inset-bottom))}
.view{display:none}.view.on{display:block}
.card{background:var(--kw);border:1px solid var(--kb);border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(10,36,99,.06)}
.ctitle{font-size:15px;font-weight:700;color:var(--kn);margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid var(--kn);display:flex;align-items:center;gap:8px}
.ctitle::before{content:'';display:block;width:4px;height:16px;background:var(--kr);border-radius:2px;flex-shrink:0}
.srow{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.sc{background:var(--kn);border-radius:12px;padding:14px 12px;text-align:center}
.sl{font-size:11px;color:rgba(255,255,255,.65);margin-bottom:5px;font-weight:500}
.sv{font-size:24px;font-weight:700;color:#fff}
.su{font-size:12px;color:rgba(255,255,255,.65);font-weight:400}
.brow{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.blbl{font-size:13px;color:var(--ks);width:36px;text-align:right;flex-shrink:0;font-weight:500}
.btrack{flex:1;height:20px;background:#e8eaf2;border-radius:6px;overflow:hidden}
.bfill{height:100%;border-radius:6px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.bpct{font-size:12px;color:var(--ks);width:34px;font-weight:600}
.qrow{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--kb);cursor:pointer}
.qrow:last-child{border-bottom:none}
.qlbl{font-size:15px;font-weight:600;color:var(--kn)}
.qlvl{font-size:12px;color:var(--kr);background:#fef0f2;padding:3px 10px;border-radius:99px;font-weight:600;border:1px solid #fcd0d6}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px}
.field label{font-size:13px;color:var(--ks);display:block;margin-bottom:6px;font-weight:600}
.field select,.field input,.field textarea{width:100%;font-size:15px;padding:10px 12px;border:1.5px solid var(--kb);border-radius:10px;background:var(--kw);color:var(--kt);outline:none;font-family:inherit;font-weight:500;-webkit-appearance:none;transition:border-color .15s}
.field select:focus,.field input:focus,.field textarea:focus{border-color:var(--kn)}
.field textarea{resize:vertical;min-height:100px;font-size:14px;line-height:1.6}
.bp{font-size:15px;font-weight:700;padding:13px 24px;border:none;background:var(--kn);color:#fff;border-radius:10px;cursor:pointer;font-family:inherit;width:100%;letter-spacing:.03em;transition:background .15s}
.bp:hover{background:var(--kn2)}
.bpr{font-size:15px;font-weight:700;padding:13px 24px;border:none;background:var(--kr);color:#fff;border-radius:10px;cursor:pointer;font-family:inherit;transition:background .15s;flex:1}
.bpr:hover{background:var(--kr2)}
.bpg{font-size:14px;font-weight:700;padding:11px 20px;border:none;background:var(--ko);color:#fff;border-radius:10px;cursor:pointer;font-family:inherit;transition:opacity .15s}
.bpg:hover{opacity:.85}
.bs{font-size:14px;padding:11px 18px;border:1.5px solid var(--kb);border-radius:10px;cursor:pointer;background:var(--kw);color:var(--kt);font-family:inherit;font-weight:600;transition:all .15s}
.bs:hover{border-color:var(--kn);color:var(--kn)}
.prog-wrap{margin-bottom:16px}
.prog-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.prog-lbl{font-size:13px;font-weight:600;color:var(--kn)}
.prog-pct{font-size:13px;font-weight:700;color:var(--kr)}
.prog-track{height:8px;background:#e8eaf2;border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--kn),var(--kr));border-radius:99px;transition:width .4s}
.qsubj{display:inline-block;font-size:12px;font-weight:700;color:#fff;background:var(--kn);padding:3px 10px;border-radius:99px;margin-bottom:10px;letter-spacing:.05em}
.qtext{font-size:16px;line-height:1.85;white-space:pre-wrap;color:var(--kt);font-weight:500}
.ans-wrap{position:relative;margin-bottom:12px}
.ans-area{width:100%;font-size:15px;padding:12px 50px 12px 14px;border:2px solid var(--kb);border-radius:10px;background:var(--kw);color:var(--kt);min-height:80px;resize:none;font-family:inherit;outline:none;display:block;transition:border-color .2s;font-weight:500}
.ans-area:focus{border-color:var(--kn)}
.ans-area.listening{border-color:var(--kr);background:#fff8f9}
.mic-btn{position:absolute;right:10px;top:10px;width:34px;height:34px;border-radius:50%;border:2px solid var(--kb);cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--kw);transition:all .2s}
.mic-btn.listening{background:var(--kr);border-color:var(--kr)}
.mic-btn.listening svg{stroke:#fff}
.mic-btn svg{width:16px;height:16px;stroke:var(--ks);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.vstatus{font-size:13px;padding:8px 14px;border-radius:8px;margin-bottom:10px;display:none;font-weight:500}
.vstatus.on{display:block;background:#fef0f2;color:var(--kr);border:1px solid #fcd0d6}
.vstatus.done{display:block;background:#f0f7ec;color:#1f5c0f;border:1px solid #c4e0b5}
@keyframes wave{0%,100%{transform:scaleY(1)}50%{transform:scaleY(2.5)}}
.wb{display:inline-flex;gap:3px;align-items:center;vertical-align:middle;margin-left:6px}
.wb span{width:3px;height:10px;background:currentColor;border-radius:99px;animation:wave .6s ease-in-out infinite}
.wb span:nth-child(2){animation-delay:.1s}.wb span:nth-child(3){animation-delay:.2s}.wb span:nth-child(4){animation-delay:.3s}
.btnrow{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.fb{font-size:14px;line-height:1.75;padding:14px 16px;border-radius:10px;margin-bottom:12px;white-space:pre-wrap;display:none;font-weight:500}
.fb.ok{background:#f0f7ec;color:#1f5c0f;border:1px solid #c4e0b5}
.fb.ng{background:#fef0f2;color:var(--kr);border:1px solid #fcd0d6}
.aipanel{border:1.5px solid var(--kn);border-radius:10px;overflow:hidden;margin-top:12px}
.aiph{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:var(--kn);cursor:pointer}
.aipt{font-size:13px;font-weight:700;color:#fff;letter-spacing:.03em}
.aich{font-size:12px;color:rgba(255,255,255,.7)}
.aipb{padding:14px;font-size:14px;line-height:1.8;background:var(--kw)}
.aibrow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.aib{font-size:13px;padding:7px 14px;border:1.5px solid var(--kn);border-radius:99px;cursor:pointer;background:var(--kw);color:var(--kn);font-family:inherit;font-weight:600;transition:all .15s}
.aib:hover,.aib.on{background:var(--kn);color:#fff}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:20px;height:20px;border:2px solid var(--kb);border-top-color:var(--kn);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:8px}
.loading-card{background:var(--kw);border:1px solid var(--kb);border-radius:12px;padding:32px 16px;margin-bottom:14px;text-align:center}
.loading-text{font-size:14px;color:var(--ks);font-weight:500}
.tag-ai{font-size:10px;font-weight:700;background:var(--kr);color:#fff;padding:2px 7px;border-radius:99px;letter-spacing:.05em}
.tag-db{font-size:10px;font-weight:700;background:var(--ks);color:#fff;padding:2px 7px;border-radius:99px;letter-spacing:.05em}
.tag-mt{font-size:10px;font-weight:700;background:var(--ko);color:#fff;padding:2px 7px;border-radius:99px;letter-spacing:.05em}
.reswrap{text-align:center;padding:24px 0}
.rescircle{width:88px;height:88px;border-radius:50%;border:3px solid var(--kn);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;margin:0 auto 16px;color:var(--kn)}
.restitle{font-size:20px;font-weight:700;color:var(--kn);margin-bottom:8px}
.ressub{font-size:14px;color:var(--ks);margin-bottom:20px}
.resdetail{text-align:left;font-size:14px;line-height:1.8;background:#f0f3fa;padding:14px;border-radius:10px;margin-bottom:16px;white-space:pre-wrap;border-left:4px solid var(--kn);color:var(--kt)}
.hgrid{display:grid;grid-template-columns:78px 50px 1fr 44px 42px 34px;gap:5px}
.hhdr{font-size:11px;color:var(--ks);font-weight:700;padding-bottom:8px;border-bottom:2px solid var(--kn);margin-bottom:6px}
.hrow{font-size:13px;padding:9px 0;border-bottom:1px solid var(--kb);align-items:center;color:var(--ks)}
.hrow:last-child{border-bottom:none}
.badge{font-size:11px;padding:3px 8px;border-radius:99px;font-weight:700;display:inline-block}
.gs{background:#f0f7ec;color:#1f5c0f;border:1px solid #c4e0b5}
.ga{background:#eef4fb;color:#0c447c;border:1px solid #b5d4f4}
.gb{background:#fef9ee;color:#854F0B;border:1px solid #FAC775}
.gc{background:#fef0f2;color:var(--kr);border:1px solid #fcd0d6}
.mig{background:linear-gradient(135deg,var(--kn),var(--kn2));border-radius:12px;padding:16px;margin-bottom:16px;color:#fff}
/* マンスリーテスト専用スタイル */
.countdown-box{background:linear-gradient(135deg,var(--kn),var(--kn2));border-radius:16px;padding:20px;margin-bottom:16px;text-align:center;color:#fff}
.countdown-label{font-size:12px;color:rgba(255,255,255,.7);margin-bottom:8px;font-weight:600;letter-spacing:.08em}
.countdown-days{font-size:52px;font-weight:800;line-height:1;margin-bottom:4px}
.countdown-days.urgent{color:#ffd580}
.countdown-sub{font-size:13px;color:rgba(255,255,255,.75)}
.range-tag{display:inline-block;font-size:12px;font-weight:600;padding:4px 12px;border-radius:99px;margin:3px;cursor:pointer;transition:all .15s}
.range-tag.sel{background:var(--kn);color:#fff;border:1.5px solid var(--kn)}
.range-tag.unsel{background:var(--kw);color:var(--kn);border:1.5px solid var(--kb)}
.range-tag:hover{border-color:var(--kn)}
.weakness-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--kb);font-size:14px}
.weakness-item:last-child{border-bottom:none}
.weakness-subj{font-weight:600;color:var(--kn);margin-right:8px}
.weakness-unit{color:var(--ks)}
.weakness-count{font-size:12px;font-weight:700;color:var(--kr);background:#fef0f2;padding:2px 8px;border-radius:99px;border:1px solid #fcd0d6}
.mt-exam-row{padding:12px 0;border-bottom:1px solid var(--kb)}
.mt-exam-row:last-child{border-bottom:none}
.mt-exam-name{font-size:14px;font-weight:700;color:var(--kn);margin-bottom:4px}
.mt-exam-date{font-size:12px;color:var(--ks)}
.mt-exam-days{font-size:12px;font-weight:700;padding:2px 8px;border-radius:99px}
.days-soon{background:#fef0f2;color:var(--kr);border:1px solid #fcd0d6}
.days-ok{background:#eef4fb;color:#0c447c;border:1px solid #b5d4f4}
.days-done{background:#f0f0ea;color:#888;border:1px solid #ddd}
.genbox{background:#f0f3fa;border:1px solid var(--kb);border-radius:10px;padding:14px;margin-bottom:14px}
.genbox-title{font-size:13px;font-weight:700;color:var(--kn);margin-bottom:6px}
.genbox-sub{font-size:12px;color:var(--ks);line-height:1.6}
</style>
</head>
<body>
<div class="app">
<div class="header">
  <div class="hlogo">

<script>
const SAVE_KEY='keio-drill-final';
const MT_KEY='keio-mt-data';
const OLD_KEYS=['drill-hist2','keio-drill-v3','keio-drill-v4','keio-drill-v5'];
const SC={算数:'#0a2463',国語:'#c8102e',理科:'#1D9E75',社会:'#B8960C'};
const UNITS={算数:['速さ','割合','図形','計算','場合の数','比・比例'],国語:['漢字・語彙','読解','記述・作文','文法'],理科:['電気','植物','天体・地層','動物・人体','化学変化'],社会:['地理','歴史','公民・時事']};
const BACKUP={
  算数:{速さ:[{q:'時速60kmで走る電車が3時間で進む距離は何kmですか？',a:'180km',h:'距離＝速さ×時間'},{q:'1800mの池の周りを太郎は分速90m、花子は分速60mで同じ方向に歩き始めました。追いつくのは何分後ですか？',a:'60分後',h:'差の距離÷速さの差'}],割合:[{q:'定価2000円の商品を2割引きで買いました。代金は何円ですか？',a:'1600円',h:'2割引き＝0.8倍'}]},
  国語:{'漢字・語彙':[{q:'次の読み方を書きなさい。\n①快晴　②冷静　③節約　④誠実',a:'かいせい れいせい せつやく せいじつ',h:'4つ入っていれば正解'}]},
  理科:{電気:[{q:'光合成に必要な3つのものを答えなさい。',a:'水 二酸化炭素 光',h:'3つ入っていれば正解'}]},
  社会:{歴史:[{q:'江戸幕府を開いた人物と年を答えなさい。',a:'徳川家康 1603',h:'人物と年が入っていれば正解'}]}
};

let hist=[];
let mtData={ranges:[],exams:[]};
let recog=null,isListening=false,aiOpen=false;
let sess={qs:[],idx:0,correct:0,answers:[],scores:[],subject:'',unit:'',level:'',school:'',date:'',aiGenerated:false,isMT:false,mtRangeId:null,backView:'setup'};

function loadData(){
  try{
    const raw=localStorage.getItem(SAVE_KEY);
    hist=raw?JSON.parse(raw):[];
    if(!Array.isArray(hist))hist=[];
  }catch(e){
    hist=[];
    try{localStorage.removeItem(SAVE_KEY);}catch(e2){}
  }
  try{
    const raw=localStorage.getItem(MT_KEY);
    mtData=raw?JSON.parse(raw):{ranges:[],exams:[]};
    if(!mtData||typeof mtData!=='object')mtData={ranges:[],exams:[]};
    if(!Array.isArray(mtData.ranges))mtData.ranges=[];
    if(!Array.isArray(mtData.exams))mtData.exams=[];
  }catch(e){
    mtData={ranges:[],exams:[]};
    try{localStorage.removeItem(MT_KEY);}catch(e2){}
  }
}
function save(){
  try{localStorage.setItem(SAVE_KEY,JSON.stringify(hist));}catch(e){}
  try{localStorage.setItem(MT_KEY,JSON.stringify(mtData));}catch(e){}
}

// ── 判定 ──
function norm(s){return s.replace(/[　\t\r\n]/g,' ').replace(/[①②③④⑤⑥⑦⑧⑨⑩]/g,'').replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0)).replace(/[Ａ-Ｚａ-ｚ]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0)).replace(/[、，,・　]/g,' ').replace(/\s+/g,' ').trim().toLowerCase();}
function kws(s){return norm(s).split(/[\s\/／「」（）()\[\]。]+/).map(w=>w.trim()).filter(w=>w.length>=2);}
function chkOk(ans,correct){const na=norm(ans),nc=norm(correct);if(na===nc||na.includes(nc)||nc.includes(na))return true;const kw=kws(correct);if(!kw.length)return false;const m=kw.filter(k=>na.includes(k));return kw.length<=2?m.length===kw.length:m.length/kw.length>=0.7;}

// ── API ──
async function callAPI(system,user,maxT=800){
  const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:maxT,system,messages:[{role:'user',content:user}]})});
  const d=await res.json();return d.content?.map(c=>c.text||'').join('')||'';
}
async function generateQuestions(subject,unit,level,count,school,rangeText=''){
  const sStr=school==='全般'?'慶應義塾中学受験全般':'慶應義塾'+school;
  const rangeNote=rangeText?'\n\n【今月の試験範囲】\n'+rangeText:'';
  const prompt='小学6年生向けの中学受験問題を'+count+'問作成してください。\n科目：'+subject+'、単元：'+unit+'、難易度：'+level+'、志望校：'+sStr+rangeNote+'\n\nJSON形式のみで返してください：\n{"questions":[{"q":"問題文","a":"正答キーワード（スペース区切り）","h":"ポイント（15字以内）"},...]}';
  const raw=await callAPI('中学受験専門の出題AIです。指定されたJSON形式のみで返してください。',prompt,1200);
  const clean=raw.replace(/```json|```/g,'').trim();
  return JSON.parse(clean).questions;
}

// ── 月テスト機能 ──
function mtTab(tab){
  ['range','drill','weak','exam'].forEach(t=>{
    document.getElementById('mt-'+t).style.display=t===tab?'':'none';
    const btn=document.getElementById('mt-tab-'+t);
    btn.style.background=t===tab?'var(--kn)':'var(--kw)';
    btn.style.color=t===tab?'#fff':'var(--kn)';
  });
  if(tab==='drill')renderMtDrill();
  if(tab==='weak')renderMtWeak();
  if(tab==='exam')renderExamList();
}

function saveMtRange(){
  const name=document.getElementById('mt-name').value.trim();
  const date=document.getElementById('mt-date').value;
  const math=document.getElementById('mt-math').value.trim();
  const jpn=document.getElementById('mt-jpn').value.trim();
  const sci=document.getElementById('mt-sci').value.trim();
  const soc=document.getElementById('mt-soc').value.trim();
  if(!name){alert('テスト名を入力してください。');return;}
  if(!math&&!jpn&&!sci&&!soc){alert('少なくとも1科目の範囲を入力してください。');return;}
  const range={id:Date.now(),name,date,ranges:{算数:math,国語:jpn,理科:sci,社会:soc},created:new Date().toISOString().split('T')[0]};
  mtData.ranges.unshift(range);
  if(mtData.ranges.length>12)mtData.ranges=mtData.ranges.slice(0,12);
  // 試験日程にも自動追加
  if(date&&name){
    mtData.exams=mtData.exams.filter(e=>e.name!==name);
    mtData.exams.push({id:Date.now()+1,name,date});
    mtData.exams.sort((a,b)=>a.date.localeCompare(b.date));
  }
  save();
  document.getElementById('mt-name').value='';
  document.getElementById('mt-date').value='';
  document.getElementById('mt-math').value='';
  document.getElementById('mt-jpn').value='';
  document.getElementById('mt-sci').value='';
  document.getElementById('mt-soc').value='';
  renderSavedRanges();
  renderMtCountdown();
  renderMtNextCard();
  alert('試験範囲を保存しました！');
}

function renderSavedRanges(){
  const el=document.getElementById('mt-saved-ranges');
  if(!mtData.ranges.length){el.innerHTML='';return;}
  el.innerHTML=mtData.ranges.slice(0,3).map(r=>`
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div style="font-size:14px;font-weight:700;color:var(--kn)">${r.name}</div>
        <div style="font-size:12px;color:var(--ks)">${r.date||'日付未設定'}</div>
      </div>
      ${Object.entries(r.ranges).filter(([,v])=>v).map(([k,v])=>`
        <div style="margin-bottom:8px">
          <div style="font-size:11px;font-weight:700;color:${SC[k]};margin-bottom:3px">${k}</div>
          <div style="font-size:13px;color:var(--ks);line-height:1.6">${v}</div>
        </div>`).join('')}
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="bpg" style="flex:1;font-size:13px;padding:9px" onclick="startMtDrill(${r.id})">この範囲でドリル →</button>
        <button class="bs" style="font-size:12px;padding:8px 12px" onclick="deleteMtRange(${r.id})">削除</button>
      </div>
    </div>`).join('');
}

function deleteMtRange(id){
  mtData.ranges=mtData.ranges.filter(r=>r.id!==id);
  save();renderSavedRanges();
}

function renderMtDrill(){
  const el=document.getElementById('mt-drill-content');
  if(!mtData.ranges.length){
    el.innerHTML='<div class="card" style="text-align:center;padding:24px;color:var(--ks);font-size:14px">まず「試験範囲入力」タブで範囲を登録してください。</div>';
    return;
  }
  const latest=mtData.ranges[0];
  const subjects=Object.entries(latest.ranges).filter(([,v])=>v);
  el.innerHTML=`
    <div class="card" style="margin-bottom:12px">
      <div style="font-size:13px;font-weight:700;color:var(--kn);margin-bottom:4px">${latest.name}</div>

function startMtDrillFromTab(rangeId){

function startMtDrill(rangeId){
  const range=mtData.ranges.find(r=>r.id===rangeId);
  if(!range)return;
  const subjects=Object.entries(range.ranges).filter(([,v])=>v);
  if(!subjects.length){alert('試験範囲が入力されていません。');return;}
  const subj=subjects[0][0];
  startMtDrillWith(rangeId,subj,'標準',5,'全般');
}

async function startMtDrillWith(rangeId,subject,level,count,school){
  const range=mtData.ranges.find(r=>r.id===rangeId);
  if(!range)return;
  const rangeText=range.ranges[subject]||'';
  sess={qs:[],idx:0,correct:0,answers:[],scores:[],subject,unit:'マンスリーテスト範囲',level,school,date:new Date().toISOString().split('T')[0],aiGenerated:false,isMT:true,mtRangeId:rangeId,backView:'monthly'};
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('v-drill').classList.add('on');
  document.getElementById('drill-loading').style.display='block';
  document.getElementById('drill-main').style.display='none';
  document.getElementById('qmeta').textContent=subject+'：'+range.name+' — AI生成中...';
  document.getElementById('ppct').textContent='';
  try{
    const prompt='小学6年生向けの中学受験問題を'+count+'問作成してください。\n科目：'+subject+'、難易度：'+level+'\n\n【今月のマンスリーテスト試験範囲】\n'+rangeText+'\n\n必ずこの試験範囲に沿った問題を作成してください。\nJSON形式のみで返してください：\n{"questions":[{"q":"問題文","a":"正答キーワード（スペース区切り）","h":"ポイント（15字以内）"},...]}';
    const raw=await callAPI('中学受験専門の出題AIです。試験範囲に沿った問題をJSON形式のみで返してください。',prompt,1200);
    const clean=raw.replace(/```json|```/g,'').trim();
    sess.qs=JSON.parse(clean).questions;
    sess.aiGenerated=true;
  }catch(e){
    const backup=BACKUP[subject]||{};
    const pool=Object.values(backup).flat().sort(()=>Math.random()-.5).slice(0,count);
    if(!pool.length){document.getElementById('drill-loading').style.display='none';alert('問題の生成に失敗しました。');gv('monthly');return;}
    sess.qs=pool;sess.aiGenerated=false;
  }
  document.getElementById('drill-loading').style.display='none';
  document.getElementById('drill-main').style.display='block';
  document.getElementById('res-retry-btn').onclick=()=>gv('monthly');
  renderQ();
}

function renderMtWeak(){

  if(!hist.length){el.innerHTML='<div class="card" style="text-align:center;padding:24px;color:var(--ks);font-size:14px">まだドリルの記録がありません。</div>';return;}

  const mtHist=hist.filter(h=>h.isMT);
  const allHist=hist.slice(0,50);
  // 科目別の誤答率を計算
  const subjectStats={};
  allHist.forEach(h=>{

    subjectStats[h.subject].correct+=h.correct;
  });
  const weakSubjects=Object.entries(subjectStats)
    .map(([s,d])=>({subject:s,rate:d.total>0?Math.round(d.correct/d.total*100):0,total:d.total}))

  if(!weakSubjects.length){el.innerHTML='<div class="card" style="text-align:center;padding:24px;color:var(--ks);font-size:14px">まだ十分なデータがありません。ドリルをもっと練習しましょう。</div>';return;}

  el.innerHTML=`
    <div class="card">
      <div class="ctitle">科目別 弱点ランキング</div>
      ${weakSubjects.map(x=>`
        <div class="brow">
          <div class="blbl">${x.subject}</div>
          <div class="btrack"><div class="bfill" style="width:${x.rate}%;background:${x.rate<50?'var(--kr)':x.rate<70?'var(--ko)':'#1D9E75'}"></div></div>
          <div class="bpct">${x.rate}%</div>
        </div>`).join('')}

      <div class="ctitle">AIによる弱点対策アドバイス</div>

    <div class="card">
      <div class="ctitle">弱点科目を集中ドリル</div>
      ${weakSubjects.slice(0,2).map(x=>`
        <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--kb)">

function getDaysLeft(dateStr){
  const today=new Date();today.setHours(0,0,0,0);
  const target=new Date(dateStr);target.setHours(0,0,0,0);
  return Math.round((target-today)/(1000*60*60*24));
}

// ── 音声 ──
function initRecog(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR)return null;
  const r=new SR();r.lang='ja-JP';r.continuous=false;r.interimResults=true;
  r.onstart=()=>{isListening=true;document.getElementById('mic-btn').classList.add('listening');document.getElementById('qans').classList.add('listening');const s=document.getElementById('vstatus');s.className='vstatus on';s.innerHTML='聞いています…<span class="wb"><span></span><span></span><span></span><span></span></span>';};
  r.onresult=(e)=>{let f='',i='';for(let x=e.resultIndex;x<e.results.length;x++){if(e.results[x].isFinal)f+=e.results[x][0].transcript;else i+=e.results[x][0].transcript;}const a=document.getElementById('qans');if(f)a.value=(a.value+f).trim();else if(i)a.placeholder=i+'...';};
  r.onend=()=>{isListening=false;document.getElementById('mic-btn').classList.remove('listening');const a=document.getElementById('qans');a.classList.remove('listening');a.placeholder='答えをここに書くか、マイクで話してください…';const s=document.getElementById('vstatus');if(a.value){s.className='vstatus done';s.textContent='認識しました。確認して「答え合わせ」を押してください。';setTimeout(()=>{s.className='vstatus';},3000);}else s.className='vstatus';};
  r.onerror=(e)=>{isListening=false;document.getElementById('mic-btn').classList.remove('listening');document.getElementById('qans').classList.remove('listening');if(e.error==='not-allowed'){const s=document.getElementById('vstatus');s.className='vstatus on';s.textContent='マイクのアクセスが拒否されています。Safariの設定から許可してください。';}else document.getElementById('vstatus').className='vstatus';};
  return r;
}
function toggleVoice(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){alert('音声入力はSafariで利用できます。');return;}if(!recog)recog=initRecog();if(isListening)recog.stop();else{document.getElementById('qans').value='';recog.start();}}

function togAI(){aiOpen=!aiOpen;document.getElementById('aipb').style.display=aiOpen?'':'none';document.getElementById('aich').textContent=aiOpen?'▲':'▼';}

function checkA(){
  const ans=document.getElementById('qans').value.trim();
  if(!ans){alert('答えを入力してください。');return;}
  if(isListening&&recog)recog.stop();
  const q=sess.qs[sess.idx];sess.answers.push(ans);
  const ok=chkOk(ans,q.a);sess.scores.push(ok?'正解':'不正解');if(ok)sess.correct++;
  const fb=document.getElementById('fb');fb.style.display='block';
  fb.className='fb '+(ok?'ok':'ng');
  fb.textContent=(ok?'正解！\n\n':'もう少し！\n\n')+'正答：'+q.a+(q.h?'\n\nポイント：'+q.h:'');
  document.getElementById('bcheck').style.display='none';
  document.getElementById('bnext').style.display='';
  if(!ok){aiOpen=true;document.getElementById('aipb').style.display='';document.getElementById('aich').textContent='▲';document.getElementById('aipt').textContent='AI サポート — 解説を見よう';runAI('explain');}
}
function nextQ(){sess.idx++;if(sess.idx>=sess.qs.length)finishDrill();else renderQ();}
function skipQ(){if(isListening&&recog)recog.stop();sess.answers.push('');sess.scores.push('スキップ');sess.idx++;if(sess.idx>=sess.qs.length)finishDrill();else renderQ();}

async function runAI(type){
  document.querySelectorAll('.aib').forEach(b=>b.classList.remove('on'));
  const btn=document.querySelector('.aib[onclick="runAI(''+type+'')"]');if(btn)btn.classList.add('on');
  const out=document.getElementById('aiout');out.innerHTML='<span style="color:var(--ks)"><span class="spinner"></span>AIが考え中...</span>';
  const q=sess.qs[sess.idx],ans=sess.answers[sess.answers.length-1]||'（未回答）';
  const p={hint:'この問題のヒントを1〜2文で。答えは言わないでください。\n科目：'+sess.subject+'、単元：'+sess.unit+'\n問題：'+q.q,explain:'この問題を小学6年生向けにステップごとに丁寧に解説してください。\n問題：'+q.q+'\n正答：'+q.a+'\n生徒の答え：'+ans,similar:'同じ単元の類題を1問と解答を作ってください。難易度：'+sess.level+'\n科目：'+sess.subject+'、単元：'+sess.unit,why:'間違えた理由を分析して、改善アドバイスを2〜3文で。\n問題：'+q.q+'\n正答：'+q.a+'\n生徒の答え：'+ans};
  try{const text=await callAPI('慶應義塾中学受験専門の家庭教師AIです。小学6年生の男の子に、やさしく丁寧に教えてください。',p[type],700);out.textContent=text||'エラーが発生しました。';}catch(e){out.textContent='AI接続エラー。インターネット接続を確認してください。';}
}

async function finishDrill(){
  const total=sess.qs.length,correct=sess.correct,pct=Math.round(correct/total*100);
  const grade=pct>=90?'S':pct>=70?'A':pct>=50?'B':'C';
  const gc={S:'#1f5c0f',A:'#0a2463',B:'#854F0B',C:'#c8102e'};
  document.getElementById('rc').textContent=grade;
  document.getElementById('rc').style.color=gc[grade];
  document.getElementById('rc').style.borderColor=gc[grade];
  document.getElementById('rt').textContent=correct+'/'+total+'問正解（'+pct+'%）';
  document.getElementById('rs').textContent={S:'完璧！慶應合格に近づいています！',A:'よくできました！',B:'あと少し！復習して再挑戦。',C:'基礎から確認しましょう。'}[grade];
  const wrongs=sess.qs.filter((_,i)=>sess.scores[i]!=='正解').map((q,i)=>'・問'+(i+1)+'：'+q.a).join('\n');
  document.getElementById('rd').textContent=wrongs?'間違えた問題の正答：\n'+wrongs:'全問正解！素晴らしい！';
  hist.unshift({date:sess.date,subject:sess.subject,unit:sess.unit,level:sess.level,school:sess.school,total,correct,grade,ai:sess.aiGenerated,isMT:sess.isMT});
  if(hist.length>200)hist=hist.slice(0,200);save();
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.getElementById('v-result').classList.add('on');
  const ce=document.getElementById('coachout');
  try{
    const mistakes=sess.qs.filter((_,i)=>sess.scores[i]!=='正解').map((q,i)=>'問'+(i+1)+'（'+q.a+'）').join('、');
    const mtNote=sess.isMT?'\nこれはマンスリーテスト対策のドリルです。':'';
    const text=await callAPI('慶應受験を目指す小学6年生へのコーチとして、励ましながら具体的な次の学習アドバイスを3文以内で。','科目：'+sess.subject+'、単元：'+sess.unit+'、難易度：'+sess.level+'、正答率：'+pct+'%'+mtNote+'\n間違えた問題：'+(mistakes||'なし（全問正解）'),300);
    ce.textContent=text||'お疲れ様でした！';ce.style.color='var(--kt)';
  }catch(e){ce.textContent='お疲れ様でした！次も頑張りましょう。';ce.style.color='var(--kt)';}
}

// ── ホーム ──
function renderHome(){
  const tq=hist.reduce((a,h)=>a+h.total,0),tc=hist.reduce((a,h)=>a+h.correct,0);
  document.getElementById('hstats').innerHTML='<div class="sc"><div class="sl">ドリル回数</div><div class="sv">'+hist.length+'<span class="su"> 回</span></div></div><div class="sc"><div class="sl">総問題数</div><div class="sv">'+tq+'<span class="su"> 問</span></div></div><div class="sc"><div class="sl">平均正答率</div><div class="sv">'+(tq>0?Math.round(tc/tq*100):0)+'<span class="su"> %</span></div></div>';
  document.getElementById('achart').innerHTML=['算数','国語','理科','社会'].map(s=>{const sh=hist.filter(h=>h.subject===s);const pct=sh.length?Math.round(sh.reduce((a,h)=>a+h.correct,0)/sh.reduce((a,h)=>a+h.total,0)*100):0;return '<div class="brow"><div class="blbl">'+s+'</div><div class="btrack"><div class="bfill" style="width:'+pct+'%;background:'+SC[s]+'"></div></div><div class="bpct">'+(sh.length?pct+'%':'—')+'</div></div>';}).join('');
  document.getElementById('qlist').innerHTML=[{s:'算数',u:'速さ',l:'標準',sc:'全般'},{s:'算数',u:'割合',l:'応用',sc:'普通部'},{s:'国語',u:'漢字・語彙',l:'基礎',sc:'全般'},{s:'理科',u:'電気',l:'標準',sc:'中等部'},{s:'社会',u:'歴史',l:'標準',sc:'全般'}].map(r=>'<div class="qrow" onclick="loadP(''+r.s+'',''+r.u+'',''+r.l+'',''+r.sc+'')"><span class="qlbl">'+r.s+'：'+r.u+'</span><div style="display:flex;gap:6px;align-items:center"><span class="qlvl">'+r.l+'</span>'+(r.sc!=='全般'?'<span style="font-size:11px;color:var(--ks);background:#f0f3fa;padding:2px 8px;border-radius:99px;border:1px solid var(--kb)">'+r.sc+'</span>':'')+'</div></div>').join('');
}
function loadP(s,u,l,sc){gv('setup');document.getElementById('ds').value=s;upU();document.getElementById('du').value=u;document.getElementById('dl').value=l;document.getElementById('dsc').value=sc||'全般';}

function renderHist(){
  if(!hist.length){document.getElementById('hbody').innerHTML='<div style="font-size:14px;color:var(--ks);padding:14px 0;text-align:center">まだ履歴がありません。</div>';return;}
  const gs={S:'gs',A:'ga',B:'gb',C:'gc'};
  document.getElementById('hbody').innerHTML='<div class="hgrid hhdr"><span>日付</span><span>科目</span><span>単元</span><span>正答率</span><span>学校</span><span>評価</span></div>'+hist.slice(0,30).map(h=>'<div class="hgrid hrow"><span>'+h.date+'</span><span style="color:'+SC[h.subject]+';font-weight:700">'+h.subject+'</span><span style="font-size:12px">'+(h.isMT?'<span class="tag-mt" style="margin-right:4px">月テ</span>':'')+h.unit+'</span><span style="font-weight:700">'+Math.round(h.correct/h.total*100)+'%</span><span style="font-size:11px">'+(h.school||'—')+'</span><span><span class="badge '+gs[h.grade]+'">'+h.grade+'</span></span></div>').join('');
}

// ── 移行 ──
function checkMig(){
  if(localStorage.getItem('keio-migrated'))return;
  let old=[];OLD_KEYS.forEach(k=>{try{const raw=localStorage.getItem(k);if(raw){const d=JSON.parse(raw);if(Array.isArray(d)&&d.length)old=old.concat(d);}}catch(e){}});
  if(!old.length)return;
  const b=document.getElementById('mig-banner');if(!b)return;
  b.innerHTML='<div class="mig"><div style="font-size:14px;font-weight:700;margin-bottom:6px">過去のデータが見つかりました</div><div style="font-size:13px;color:rgba(255,255,255,.8);margin-bottom:12px">以前のバージョンで記録した'+old.length+'件を引き継げます。</div><button style="font-size:13px;font-weight:700;padding:8px 18px;background:var(--kr);color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:inherit" onclick="doMig()">データを引き継ぐ</button><button style="font-size:12px;padding:8px 14px;border:none;background:none;color:rgba(255,255,255,.7);cursor:pointer;font-family:inherit" onclick="skipMig()">スキップ</button></div>';
}
function doMig(){let old=[];OLD_KEYS.forEach(k=>{try{const raw=localStorage.getItem(k);if(raw){const d=JSON.parse(raw);if(Array.isArray(d)&&d.length)old=old.concat(d);}}catch(e){}});const ex=new Set(hist.map(h=>h.date+'-'+h.subject+'-'+h.unit));const nd=old.filter(h=>!ex.has(h.date+'-'+h.subject+'-'+h.unit));hist=[...hist,...nd].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,200);save();localStorage.setItem('keio-migrated','1');document.getElementById('mig-banner').innerHTML='<div style="background:#f0f7ec;border:1px solid #c4e0b5;border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:14px;color:#1f5c0f;font-weight:600">'+nd.length+'件のデータを引き継ぎました！</div>';setTimeout(()=>{document.getElementById('mig-banner').innerHTML='';},3000);renderHome();}
function skipMig(){localStorage.setItem('keio-migrated','1');document.getElementById('mig-banner').innerHTML='';}

try{loadData();}catch(e){hist=[];mtData={ranges:[],exams:[]};}
try{upU();}catch(e){}
try{renderHome();}catch(e){}
try{renderMtNextCard();}catch(e){}
try{checkMig();}catch(e){}
</script>
</body>
